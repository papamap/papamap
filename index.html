<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#ffffff"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>">
<title>아빠맵 | 어디 갈지 고민될 때</title>
<meta property="og:title" content="아빠맵 | 어디 갈지 고민될 때">
<meta property="og:site_name" content="아빠맵">
<meta name="description" content="전국 백화점, 마트 문화센터 위치부터 주말에 아기랑 가기 좋은 나들이 장소까지 한눈에!">
<script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=xly4p0hm2g"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css"/>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="top-bar-container" id="top-bar">
<div class="top-header" onclick="document.getElementById('install-modal').style.display='flex'">
<h1 class="header-title">아빠맵</h1>
<button class="btn-header-search" onclick="event.stopPropagation(); openSearchPanel()">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
</button>
</div>
<div class="category-nav" id="category-nav">
<button class="chip active" data-cat="전체" onclick="setCategory('전체')">전체</button>
<button class="chip" data-cat="실내" onclick="setCategory('실내')">실내</button>
<button class="chip" data-cat="야외" onclick="setCategory('야외')">야외</button>
<button class="chip" data-cat="문센" onclick="setCategory('문센')">문센</button>
</div>
</div>
<div id="weather-banner" onclick="window.open('https://weather.naver.com/', '_blank')">
<span id="weather-banner-text">날씨 정보를 불러오는 중...</span>
</div>
<div class="search-panel" id="search-panel">
<div class="search-header">
<div class="search-input-area">
<input type="text" id="search-input" placeholder="장소명 검색" onfocus="document.getElementById('search-scope-toggle').classList.add('show');" onkeyup="if(event.keyCode==13) executeSearch()">
<div class="search-scope-toggle" id="search-scope-toggle">
<button class="scope-btn active" id="scope-all" onclick="setSearchScope('all')">전체 지역</button>
<button class="scope-btn" id="scope-bounds" onclick="setSearchScope('bounds')">현재 화면만</button>
<button class="scope-btn" id="scope-near" onclick="setSearchScope('near')">내 주변 5km</button>
</div>
</div>
<button class="search-close-btn" onclick="closeSearchPanel()">×</button>
</div>
<ul class="search-results-list" id="search-results-list"><div class="res-empty">검색어를 입력해 주세요.</div></ul>
</div>
<div id="map"></div>
<div id="main-popup" class="modal-overlay" style="z-index:9999;">
<div class="modal-content" style="padding:0;overflow:hidden;border-radius:20px;width:90%;max-width:400px;background:#fff;">
<div id="popup-slider" class="image-slider" style="height:auto;max-height:60vh;display:flex;"></div>
<div style="display:flex;justify-content:space-between;padding:12px 16px;background:#f8f9fa;align-items:center;border-top:1px solid #e9ecef;">
<label style="font-size:13px;color:#495057;font-weight:600;"><input type="checkbox" id="popup-hide-today"> 오늘 하루 보지 않기</label>
<button style="border:none;background:none;font-weight:800;font-size:14px;color:#343a40;cursor:pointer;" onclick="closeMainPopup()">닫기</button>
</div></div></div>
<div id="board-view">
<div id="notice-list-view">
<div class="board-title-row">
<div class="board-title">게시판<button class="btn-inquiry-small" onclick="document.getElementById('inquiry-modal').style.display='flex'" style="margin-left:4px;">문의</button></div>
<button class="btn-write-notice" onclick="openWriteNoticeModal()">글쓰기</button>
</div>
<div class="notice-list" id="notice-list-container"><div style="text-align:center;padding:40px;color:#adb5bd;font-size:13px;">불러오는 중...</div></div>
</div>
<div id="notice-detail-view" style="display:none;flex-direction:column;">
<div class="notice-detail-header">
<div class="detail-top-row">
<button class="btn-back" onclick="showNoticeList()">목록으로</button>
<div style="display:flex;gap:12px;"><button class="btn-edit-notice" onclick="openWriteNoticeModal(currentNoticeId)">수정</button><button class="btn-delete-notice" onclick="deleteNotice()">삭제</button></div>
</div>
<div class="detail-title-row"><div class="detail-title" id="detail-title"></div><div class="detail-date" id="detail-date"></div></div>
</div>
<div class="detail-body" id="detail-body"></div>
</div>
</div>
<div class="info-panel" id="info-content"></div>
<div class="fab-container" id="fab-buttons">
<button class="fab-btn btn-location" onclick="moveToCurrentLocation()"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#495057" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle><line x1="12" y1="2" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="22"></line><line x1="2" y1="12" x2="4" y2="12"></line><line x1="20" y1="12" x2="22" y2="12"></line></svg></button>
<button class="fab-btn btn-add" onclick="openAddModal()">+</button>
</div>
<nav class="bottom-nav">
<div class="nav-item active" id="nav-map" onclick="switchTab('map')"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>아빠맵</div>
<div class="nav-item" id="nav-board" onclick="switchTab('board')"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>게시판</div>
</nav>
<div class="modal-overlay" id="map-link-modal" onclick="if(event.target===this)this.style.display='none'">
<div class="modal-content" style="width:300px;padding:24px;text-align:center;border-radius:20px;">
<div class="modal-header" style="border:none;padding-bottom:0;margin-bottom:16px;"><h3 style="margin:0;font-size:18px;color:#212529;flex:1;">길찾기 앱 선택</h3><button class="panel-close-btn-static" onclick="document.getElementById('map-link-modal').style.display='none'">✕</button></div>
<div style="display:flex;flex-direction:column;gap:10px;">
<a id="link-naver" class="btn-map-text bg-naver" style="padding:14px;font-size:15px;cursor:pointer;">네이버지도</a>
<a id="link-kakao" class="btn-map-text bg-kakao" style="padding:14px;font-size:15px;cursor:pointer;">카카오맵</a>
<a id="link-tmap" class="btn-map-text bg-tmap" style="padding:14px;font-size:15px;cursor:pointer;">티맵</a>
</div></div></div>
<div class="modal-overlay" id="install-modal" onclick="if(event.target===this)this.style.display='none'">
<div class="modal-content"><div class="modal-header"><h3 style="margin:0;font-size:18px;color:#212529;">앱처럼 사용하기 📱</h3><button class="panel-close-btn-static" onclick="document.getElementById('install-modal').style.display='none'">✕</button></div>
<p style="font-size:13px;color:#495057;line-height:1.6;margin-top:14px;margin-bottom:20px;">홈 화면에 추가하면 <strong>진짜 앱처럼</strong> 사용할 수 있습니다!</p></div></div>
<div class="modal-overlay" id="inquiry-modal" onclick="if(event.target===this)this.style.display='none'" style="z-index:6000;">
<div class="modal-content"><div class="modal-header"><h3 style="margin:0;font-size:18px;color:#212529;">운영자 문의</h3><button class="panel-close-btn-static" onclick="document.getElementById('inquiry-modal').style.display='none'">✕</button></div>
<textarea id="inquiry-content" placeholder="내용을 입력해주세요" rows="4" class="full-width" style="margin-bottom:10px;"></textarea>
<input type="text" id="inquiry-contact" class="full-width" placeholder="답변 받을 이메일 (선택)">
<div class="btn-group"><button class="btn-action btn-cancel" onclick="document.getElementById('inquiry-modal').style.display='none'">취소</button><button class="btn-action btn-save" onclick="submitInquiry()">보내기</button></div>
</div></div>
<div class="modal-overlay" id="pw-modal" style="z-index:5000;" onclick="if(event.target===this)resolvePw(null)">
<div class="modal-content" style="max-width:300px;padding:20px;text-align:center;"><h4 style="margin:0 0 12px 0;color:#212529;font-size:16px;">비밀번호 확인</h4>
<input type="password" id="pw-input" placeholder="작성 시 비밀번호" style="width:100%;box-sizing:border-box;padding:12px;border-radius:8px;border:1px solid rgba(222,226,230,0.6);margin-bottom:16px;font-size:14px;" onkeyup="if(event.keyCode==13)resolvePw(this.value)">
<div class="btn-group" style="margin-top:0;"><button class="btn-action btn-cancel" onclick="resolvePw(null)">취소</button><button class="btn-action btn-save" onclick="resolvePw(document.getElementById('pw-input').value)">확인</button></div>
</div></div>
<div class="modal-overlay" id="text-prompt-modal" style="z-index:5000;" onclick="if(event.target===this)resolveTextPrompt(null)">
<div class="modal-content" style="max-width:320px;padding:20px;"><h4 style="margin:0 0 12px 0;color:#212529;font-size:16px;">추가정보 수정</h4>
<textarea id="text-prompt-input" rows="3" style="width:100%;box-sizing:border-box;padding:12px;border-radius:8px;border:1px solid rgba(222,226,230,0.6);margin-bottom:16px;resize:none;font-size:13px;font-family:inherit;"></textarea>
<div class="btn-group" style="margin-top:0;"><button class="btn-action btn-cancel" onclick="resolveTextPrompt(null)">취소</button><button class="btn-action btn-save" onclick="resolveTextPrompt(document.getElementById('text-prompt-input').value)">수정</button></div>
</div></div>
<div class="modal-overlay" id="write-notice-modal" onclick="if(event.target===this)this.style.display='none'">
<div class="modal-content"><div class="modal-header"><h3 id="modal-notice-title">게시글 작성</h3><button class="panel-close-btn-static" onclick="document.getElementById('write-notice-modal').style.display='none'">✕</button></div>
<div style="display:flex;gap:8px;margin-bottom:12px;"><input type="text" id="notice-author" placeholder="닉네임" style="flex:1;margin:0;"><input type="password" id="notice-pw" placeholder="비밀번호" style="flex:1;margin:0;"></div>
<input type="text" id="notice-title" placeholder="제목">
<textarea id="notice-content-text" placeholder="내용" rows="6" class="full-width"></textarea>
<div class="file-upload-wrap" id="wrap-notice-media">
<div class="file-upload-header"><label class="form-label" style="margin:0;">📷 사진 첨부 (최대 10장)</label><button class="file-upload-btn" onclick="document.getElementById('notice-image-file').click()">파일 선택</button></div>
<input type="file" id="notice-image-file" accept="image/*" multiple onchange="noticeMediaManager.addFiles(this)">
<div id="notice-media-preview" class="media-preview-container"></div></div>
<div class="btn-group"><button class="btn-action btn-cancel" onclick="document.getElementById('write-notice-modal').style.display='none'">취소</button><button class="btn-action btn-save" onclick="saveNotice()">등록</button></div>
</div></div>
<div class="modal-overlay" id="edit-modal" onclick="if(event.target===this)this.style.display='none'">
<div class="modal-content"><div class="modal-header"><h3>장소 수정 제안</h3><button class="panel-close-btn-static" onclick="document.getElementById('edit-modal').style.display='none'">✕</button></div>
<input type="hidden" id="edit-place-id">
<div class="radio-group" style="margin-bottom:20px;"><label class="radio-label"><input type="radio" name="edit-place-category" value="실내">실내</label><label class="radio-label"><input type="radio" name="edit-place-category" value="야외">야외</label><label class="radio-label"><input type="radio" name="edit-place-category" value="문센">문센</label></div>
<input type="text" id="edit-website" placeholder="공식 홈페이지 URL" style="margin-bottom:12px;">
<textarea id="edit-hours" placeholder="운영시간" rows="2" class="full-width" style="margin-bottom:12px;"></textarea>
<textarea id="edit-parking" placeholder="주차 정보" rows="2" class="full-width" style="margin-bottom:12px;"></textarea>
<textarea id="edit-entry" placeholder="입장료" rows="2" class="full-width" style="margin-bottom:12px;"></textarea>
<textarea id="edit-nursing" placeholder="수유실 위치" rows="1" class="full-width" style="margin-bottom:12px;"></textarea>
<textarea id="edit-comment" placeholder="상세 설명" rows="2" class="full-width" style="margin-bottom:16px;"></textarea>
<div class="file-upload-wrap" id="wrap-edit-media">
<div class="file-upload-header"><label class="form-label" style="margin:0;">📷 변경할 사진</label><button class="file-upload-btn" onclick="document.getElementById('edit-image-file').click()">파일 선택</button></div>
<input type="file" id="edit-image-file" accept="image/*" multiple onchange="placeEditMediaManager.addFiles(this)">
<div id="place-edit-media-preview" class="media-preview-container"></div></div>
<div class="btn-group"><button class="btn-action btn-cancel" onclick="document.getElementById('edit-modal').style.display='none'">취소</button><button class="btn-action btn-save" onclick="submitEditInfo()">수정 접수</button></div>
</div></div>
<div class="modal-overlay" id="add-modal" onclick="if(event.target===this)this.style.display='none'">
<div class="modal-content"><div class="modal-header"><h3>장소 등록</h3><button class="panel-close-btn-static" onclick="document.getElementById('add-modal').style.display='none'">✕</button></div>
<div class="kakao-search-box"><input type="text" id="kakao-keyword" placeholder="장소 검색" onkeypress="if(event.keyCode==13)searchKakaoPlace()"><button type="button" onclick="searchKakaoPlace()">검색</button></div>
<ul id="kakao-result-list"></ul>
<input type="text" id="place-name" placeholder="장소명" readonly required><input type="text" id="place-address" placeholder="주소" readonly>
<div class="radio-group" id="place-category-group" style="margin-bottom:20px;"><label class="radio-label"><input type="radio" name="place-category" value="실내">실내</label><label class="radio-label"><input type="radio" name="place-category" value="야외">야외</label><label class="radio-label"><input type="radio" name="place-category" value="문센">문센</label></div>
<input type="text" id="place-website" placeholder="홈페이지" style="margin-bottom:12px;">
<textarea id="place-hours-time" placeholder="운영시간" rows="2" class="full-width" style="margin-bottom:12px;"></textarea>
<textarea id="place-parking-detail" placeholder="주차" rows="2" class="full-width" style="margin-bottom:12px;"></textarea>
<textarea id="place-entry-detail" placeholder="입장료" rows="2" class="full-width" style="margin-bottom:12px;"></textarea>
<textarea id="place-nursing-detail" placeholder="수유실" rows="1" class="full-width" style="margin-bottom:12px;"></textarea>
<textarea id="place-comment" placeholder="설명" rows="2" class="full-width" style="margin-bottom:16px;"></textarea>
<div class="file-upload-wrap" id="wrap-add-media">
<div class="file-upload-header"><label class="form-label" style="margin:0;">📷 사진 첨부</label><button class="file-upload-btn" onclick="document.getElementById('place-image-file').click()">파일 선택</button></div>
<input type="file" id="place-image-file" accept="image/*" multiple onchange="placeAddMediaManager.addFiles(this)">
<div id="place-add-media-preview" class="media-preview-container"></div></div>
<div class="btn-group"><button class="btn-action btn-cancel" onclick="document.getElementById('add-modal').style.display='none'">취소</button><button class="btn-action btn-save" id="btn-save-place" onclick="savePlace()">승인 요청</button></div>
</div></div>
<script src="app.js"></script>
</body>
</html>
