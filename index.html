<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>아빠맵 | 어디 갈지 고민될 때</title>
<meta property="og:title" content="아빠맵 | 어디 갈지 고민될 때">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=YOUR_CLIENT_ID"></script>
</head>
<body>
<div class="top-bar-container">
    <div class="top-header">
        <h1 class="header-title">아빠맵</h1>
    </div>
    <div class="category-nav">
        <button class="chip active" data-cat="전체">전체</button>
        <button class="chip" data-cat="실내">실내</button>
        <button class="chip" data-cat="야외">야외</button>
        <button class="chip" data-cat="문센">문센</button>
    </div>
</div>
<div id="map"></div>

<div id="main-popup" class="modal-overlay">
    <div class="popup-content">
        <button class="btn-close-popup" onclick="closeMainPopup()">✕</button>
        <div id="popup-images" class="popup-slider"></div>
        <div class="popup-footer">
            <label><input type="checkbox" id="hide-today-chk"> 오늘 하루 보지 않기</label>
            <button onclick="closeMainPopup()">닫기</button>
        </div>
    </div>
</div>

<div id="info-panel" class="info-panel">
    <div class="drag-handle"></div>
    <div class="panel-top-bar">
        <div id="weather-info" onclick="window.open('https://weather.naver.com/', '_blank')">☀️ 24°C / 미세먼지 보통</div>
    </div>
    <div class="info-scroll-area" id="info-content">
        <div class="photo-grid" id="photo-grid-container">
            <div class="photo-item"><img src="https://via.placeholder.com/150" alt="1"></div>
            <div class="photo-item"><img src="https://via.placeholder.com/150" alt="2"></div>
            <div class="photo-item"><img src="https://via.placeholder.com/150" alt="3"></div>
            <div class="photo-item"><img src="https://via.placeholder.com/150" alt="4"></div>
            <div class="photo-item"><img src="https://via.placeholder.com/150" alt="5"></div>
        </div>
    </div>
</div>

<div id="top5-overlay" class="top5-overlay">
    <div class="top5-header">🔥 조회수 top 5</div>
    <div class="top5-list" id="top5-list"></div>
</div>
<script src="app.js"></script>
</body>
</html>
