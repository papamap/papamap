<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>">
    <title>아빠맵 | 어디 갈지 고민될 때</title>
    
    <script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=xly4p0hm2g"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar-container" id="top-bar">
        <div class="top-header">
            <h1 class="header-title">아빠맵</h1>
            <button class="btn-header-search" onclick="openSearchPanel()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
        </div>
        <div class="category-nav" id="category-nav">
            <button class="chip active" data-cat="전체" onclick="setCategory('전체')">전체</button>
            <button class="chip" data-cat="실내" onclick="setCategory('실내')">실내</button>
            <button class="chip" data-cat="야외" onclick="setCategory('야외')">야외</button>
            <button class="chip" data-cat="문센" onclick="setCategory('문센')">문센</button>
        </div>
    </div>

    <div id="weather-reco-banner" style="display:none; position:absolute; top:65px; left:16px; width:calc(100vw - 32px); background:rgba(255,107,107,0.95); color:white; padding:12px; border-radius:16px; z-index:1500; font-size:13px; font-weight:800; text-align:center; box-shadow:0 4px 16px rgba(255,107,107,0.3); backdrop-filter:blur(8px); box-sizing:border-box;"></div>

    <div class="search-panel" id="search-panel">
        <div class="search-header">
            <div class="search-input-area">
                <input type="text" id="search-input" placeholder="장소명 검색" onkeyup="if(event.keyCode===13) executeSearch()">
            </div>
            <button class="search-close-btn" onclick="closeSearchPanel()">×</button>
        </div>
        <ul class="search-results-list" id="search-results-list"></ul>
    </div>

    <div id="map"></div>

    <div id="main-popup" class="modal-overlay" style="z-index:9999; background:rgba(0,0,0,0.7);">
        <div class="modal-content" style="padding:0; overflow:hidden; border-radius:24px; width:85%; max-width:400px; border:none;">
            <div id="popup-slider" class="image-slider" style="display:flex; max-height:60vh;"></div>
            <div style="display:flex; justify-content:space-between; padding:16px 20px; background:#f8f9fa; align-items:center;">
                <label style="font-size:13px; font-weight:700;"><input type="checkbox" id="popup-hide-today" style="margin-right:6px;">오늘 하루 보지 않기</label>
                <button style="border:none; background:none; font-weight:800; font-size:14px; cursor:pointer;" onclick="closeMainPopup()">닫기</button>
            </div>
        </div>
    </div>

    <div class="info-panel panel-hidden" id="info-content">
        <div class="drag-handle-area" id="drag-handle-area">
            <div class="drag-handle-bar"></div>
        </div>
        <div class="panel-top-bar">
            <div id="weather-info-box"></div>
        </div>
        <div class="info-scroll-area" id="info-scroll-area"></div>
    </div>

    <div class="fab-container" id="fab-buttons">
        <button class="fab-btn btn-location" onclick="moveToCurrentLocation()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#495057" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle><line x1="12" y1="2" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="22"></line><line x1="2" y1="12" x2="4" y2="12"></line><line x1="20" y1="12" x2="22" y2="12"></line></svg>
        </button>
        <button class="fab-btn btn-add" onclick="openAddModal()">+</button>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" id="nav-map" onclick="switchTab('map')">
            <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>아빠맵
        </div>
        <div class="nav-item" id="nav-board" onclick="switchTab('board')">
            <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>게시판
        </div>
    </nav>

    <div class="modal-overlay" id="add-modal" onclick="if(event.target === this) this.style.display='none'">
        <div class="modal-content">
            <div class="modal-header">
                <h3>장소 등록하기</h3>
                <button class="panel-close-btn-static" onclick="document.getElementById('add-modal').style.display='none'">✕</button>
            </div>
            <input type="text" id="kakao-keyword" placeholder="장소 검색 (예: 과천 서울대공원)" onkeypress="if(event.keyCode===13) searchKakaoPlace()">
            <button onclick="searchKakaoPlace()" style="width:100%; padding:12px; margin-bottom:12px;">검색</button>
            <ul id="kakao-result-list"></ul>
            <input type="text" id="place-name" placeholder="장소명" readonly required>
            
            <div class="radio-group" style="margin-bottom: 20px;">
                <label class="radio-label"><input type="radio" name="place-category" value="실내">실내</label>
                <label class="radio-label"><input type="radio" name="place-category" value="야외">야외</label>
                <label class="radio-label"><input type="radio" name="place-category" value="문센">문센</label>
            </div>
            <textarea id="place-comment" placeholder="설명" rows="2"></textarea>
            
            <button class="btn-save" onclick="savePlace()" style="width:100%; padding:14px; border:none; border-radius:10px; color:white; font-weight:bold;">승인 요청하기</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
