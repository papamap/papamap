<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ffffff" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>">
<title>아빠맵 | 어디 갈지 고민될 때</title>
<script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=xly4p0hm2g"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="top-bar-container" id="top-bar">
    <div class="top-header" onclick="document.getElementById('install-modal').style.display='flex'">
        <h1 class="header-title">아빠맵</h1>
        <button class="btn-header-search" onclick="event.stopPropagation(); openSearchPanel()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
    </div>
    <div class="category-nav" id="category-nav">
        <button class="chip active" data-cat="전체" onclick="setCategory('전체')">전체</button>
        <button class="chip" data-cat="실내" onclick="setCategory('실내')">실내</button>
        <button class="chip" data-cat="야외" onclick="setCategory('야외')">야외</button>
        <button class="chip" data-cat="문센" onclick="setCategory('문센')">문센</button>
    </div>
</div>

<div id="weather-reco-banner" style="display:none; position:absolute; top:65px; left:16px; width:calc(100% - 32px); background:rgba(255,107,107,0.95); color:white; padding:12px; border-radius:16px; z-index:1500; font-size:13px; font-weight:800; text-align:center; box-shadow:0 4px 16px rgba(255,107,107,0.3); backdrop-filter:blur(8px);"></div>

<div class="search-panel" id="search-panel">
    <div class="search-header">
        <div class="search-input-area">
            <input type="text" id="search-input" placeholder="장소명 검색" onfocus="document.getElementById('search-scope-toggle').classList.add('show');" onkeyup="if(event.keyCode==13) executeSearch()">
            <div class="search-scope-toggle" id="search-scope-toggle">
                <button class="scope-btn active" id="scope-all" onclick="setSearchScope('all')">전체 지역</button>
                <button class="scope-btn" id="scope-bounds" onclick="setSearchScope('bounds')">현재 화면만</button>
                <button class="scope-btn" id="scope-near" onclick="setSearchScope('near')">내 주변 5km</button>
            </div>
        </div>
        <button class="search-close-btn" onclick="closeSearchPanel()">×</button>
    </div>
    <ul class="search-results-list" id="search-results-list"><div class="res-empty">검색어를 입력해 주세요.</div></ul>
</div>

<div id="map"></div>

<div id="main-popup" class="modal-overlay" style="z-index:9999; background:rgba(0,0,0,0.7);">
    <div class="modal-content" style="padding:0; overflow:hidden; border-radius:24px; width:85%; max-width:400px; background:#fff; border:none;">
        <div id="popup-slider" class="image-slider" style="display:flex; max-height:60vh;"></div>
        <div style="display:flex; justify-content:space-between; padding:16px 20px; background:#f8f9fa; align-items:center;">
            <label style="font-size:13px; color:#495057; font-weight:700;"><input type="checkbox" id="popup-hide-today" style="margin-right:6px;">오늘 하루 보지 않기</label>
            <button style="border:none; background:none; font-weight:800; font-size:14px; color:#212529; cursor:pointer; padding:0;" onclick="closeMainPopup()">닫기</button>
        </div>
    </div>
</div>

<div class="info-panel panel-hidden" id="info-content">
    <div class="drag-handle-area" id="drag-handle-area">
        <div class="drag-handle-bar"></div>
    </div>
    <div class="panel-top-bar" id="panel-top-bar" style="position:relative; padding:0 20px 12px 20px;">
        <div id="weather-info-box"></div>
        <div class="icon-actions" style="margin-left:auto;">
            <button class="icon-btn" id="btn-share-place"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg></button>
        </div>
    </div>
    <div class="info-scroll-area" id="info-scroll-area"></div>
</div>

<div id="board-view">
    <div id="notice-list-view">
        <div class="board-title-row">
            <div class="board-title">게시판<button class="btn-inquiry-small" onclick="document.getElementById('inquiry-modal').style.display='flex'" style="margin-left:4px;">문의</button></div>
            <button class="btn-write-notice" onclick="openWriteNoticeModal()">글쓰기</button>
        </div>
        <div class="notice-list" id="notice-list-container"><div style="text-align:center; padding: 40px; color: #adb5bd;">불러오는 중...</div></div>
    </div>
    <div id="notice-detail-view" style="display:none; flex-direction: column;">
        <div class="notice-detail-header">
            <div class="detail-top-row">
                <button class="btn-back" onclick="showNoticeList()"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:2px; margin-left:-6px;"><polyline points="15 18 9 12 15 6"></polyline></svg>목록으로</button>
                <div style="display:flex; gap:12px;"><button class="btn-edit-notice" onclick="openWriteNoticeModal(currentNoticeId)">수정</button><button class="btn-delete-notice" onclick="deleteNotice()">삭제</button></div>
            </div>
            <div class="detail-title-row"><div class="detail-title" id="detail-title"></div><div class="detail-date" id="detail-date"></div></div>
        </div>
        <div class="detail-body" id="detail-body"></div>
    </div>
</div>

<div class="fab-container" id="fab-buttons">
    <button class="fab-btn btn-location" onclick="moveToCurrentLocation()"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#495057" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle><line x1="12" y1="2" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="22"></line><line x1="2" y1="12" x2="4" y2="12"></line><line x1="20" y1="12" x2="22" y2="12"></line></svg></button>
    <button class="fab-btn btn-add" onclick="openAddModal()">+</button>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" id="nav-map" onclick="switchTab('map')"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>아빠맵</div>
    <div class="nav-item" id="nav-board" onclick="switchTab('board')"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>게시판</div>
</nav>

<div class="modal-overlay" id="pw-modal" style="z-index: 5000;" onclick="if(event.target === this) resolvePw(null)">
    <div class="modal-content" style="max-width: 300px; padding: 20px; text-align: center;">
        <h4 style="margin: 0 0 12px 0; color: #212529; font-size:16px;">비밀번호 확인</h4>
        <input type="password" id="pw-input" placeholder="작성 시 입력한 비밀번호" style="width: 100%; box-sizing: border-box; padding: 12px; border-radius: 8px; border: 1px solid rgba(222, 226, 230, 0.6); margin-bottom: 16px; font-size:14px;" onkeyup="if(event.keyCode==13) resolvePw(document.getElementById('pw-input').value)">
        <div class="btn-group" style="margin-top:0;"><button class="btn-action btn-cancel" onclick="resolvePw(null)">취소</button><button class="btn-action btn-save" onclick="resolvePw(document.getElementById('pw-input').value)">확인</button></div>
    </div>
</div>

<div class="modal-overlay" id="write-notice-modal" onclick="if(event.target === this) this.style.display='none'">
    <div class="modal-content"><div class="modal-header"><h3 id="modal-notice-title">게시글 작성</h3><button class="panel-close-btn-static" onclick="document.getElementById('write-notice-modal').style.display='none'">✕</button></div>
        <div style="display: flex; gap: 8px; margin-bottom: 12px;"><input type="text" id="notice-author" placeholder="닉네임" style="flex:1;"><input type="password" id="notice-pw" placeholder="비밀번호" style="flex:1;"></div>
        <input type="text" id="notice-title" placeholder="제목">
        <textarea id="notice-content-text" placeholder="내용" rows="6" class="full-width"></textarea>
        <div class="file-upload-wrap" id="wrap-notice-media">
            <div class="file-upload-header"><label class="form-label" style="margin:0;">📷 사진 첨부 (최대 10장)</label><button class="file-upload-btn" onclick="document.getElementById('notice-image-file').click()">파일 선택</button></div>
            <input type="file" id="notice-image-file" accept="image/*" multiple onchange="noticeMediaManager.addFiles(this)">
            <div id="notice-media-preview" class="media-preview-container"></div>
            <span class="file-limit-text">아이폰: 사진을 길게 누른 뒤 원하는 위치로 드래그하여 순서 변경</span>
        </div>
        <div class="btn-group"><button class="btn-action btn-cancel" onclick="document.getElementById('write-notice-modal').style.display='none'">취소</button><button class="btn-action btn-save" onclick="saveNotice()">등록</button></div>
    </div>
</div>

<div class="modal-overlay" id="edit-modal" onclick="if(event.target === this) this.style.display='none'">
    <div class="modal-content"><div class="modal-header"><h3>장소 수정</h3><button class="panel-close-btn-static" onclick="document.getElementById('edit-modal').style.display='none'">✕</button></div>
        <input type="hidden" id="edit-place-id">
        <div class="radio-group" style="margin-bottom: 20px;"><label class="radio-label"><input type="radio" name="edit-place-category" value="실내">실내</label><label class="radio-label"><input type="radio" name="edit-place-category" value="야외">야외</label><label class="radio-label"><input type="radio" name="edit-place-category" value="문센">문센</label></div>
        <input type="text" id="edit-website" placeholder="홈페이지 URL">
        <textarea id="edit-hours" placeholder="운영시간" rows="2" class="full-width"></textarea>
        <textarea id="edit-parking" placeholder="주차" rows="2" class="full-width"></textarea>
        <textarea id="edit-entry" placeholder="입장료" rows="2" class="full-width"></textarea>
        <textarea id="edit-nursing" placeholder="수유실" rows="1" class="full-width"></textarea>
        <textarea id="edit-comment" placeholder="설명" rows="2" class="full-width"></textarea>
        <div class="btn-group"><button class="btn-action btn-cancel" onclick="document.getElementById('edit-modal').style.display='none'">취소</button><button class="btn-action btn-save" onclick="submitEditInfo()">수정 요청</button></div>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
