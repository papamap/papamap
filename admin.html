<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아빠맵 관리자 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #f1f3f5; margin: 0; padding: 24px; color: #343a40; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; background: white; }
        .tab-btn.active { background: #343a40; color: white; }
        .section { display: none; background: white; padding: 20px; border-radius: 16px; }
        .section.active { display: block; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px; border-bottom: 1px solid #f1f3f5; }
        .btn { padding: 6px 12px; border: none; border-radius: 6px; color: white; cursor: pointer; }
        .btn-save { background: #5c7cfa; } .btn-del { background: #FF6B6B; }
    </style>
</head>
<body>
    <div id="login-screen" style="text-align:center; margin-top:80px;">
        <div style="background:white; padding:40px; display:inline-block; border-radius:20px;">
            <input type="email" id="admin-email" placeholder="이메일" style="padding:10px; margin-bottom:10px;"><br>
            <input type="password" id="admin-password" placeholder="비밀번호" style="padding:10px; margin-bottom:10px;"><br>
            <button onclick="submitAdminLogin()" style="padding:10px 20px; background:#343a40; color:white; border:none; border-radius:8px;">로그인</button>
        </div>
    </div>

    <div id="admin-main" style="display:none;">
        <h1>아빠맵 관리자</h1>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('places')">장소 관리</button>
            <button class="tab-btn" onclick="switchTab('board')">게시판/팝업 관리</button>
            <button class="tab-btn" onclick="switchTab('inquiries')">수정/문의사항</button>
        </div>
        
        <div id="section-places" class="section active">
            <table><thead><tr><th>ID</th><th>승인</th><th>장소명</th><th>카테고리</th><th>관리</th></tr></thead><tbody id="admin-tbody"></tbody></table>
        </div>

        <div id="section-board" class="section">
            <table><thead><tr><th>ID</th><th>상태</th><th>제목</th><th>팝업 종료일</th><th>관리</th></tr></thead><tbody id="board-tbody"></tbody></table>
        </div>

        <div id="section-inquiries" class="section">
            <table><thead><tr><th>ID</th><th>내용 (수정요청/문의)</th></tr></thead><tbody id="inquiries-tbody"></tbody></table>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
