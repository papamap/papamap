<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>관리자 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:'Pretendard',sans-serif;background:#f1f3f5;padding:24px}
.tabs{display:flex;gap:10px;margin-bottom:20px}
.tab-btn{padding:10px 20px;border-radius:12px;border:none;cursor:pointer;background:#fff}
.tab-btn.active{background:#343a40;color:#fff}
.section{display:none;background:#fff;padding:20px;border-radius:16px}
.section.active{display:block}
table{width:100%;border-collapse:collapse}
th,td{padding:12px;border-bottom:1px solid #dee2e6;text-align:left}
.stat-box{padding:20px;background:#e9ecef;border-radius:12px;margin-bottom:10px;font-weight:bold}
</style>
</head>
<body>
<h1>아빠맵 관리자</h1>
<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('places')">장소 관리</button>
    <button class="tab-btn" onclick="switchTab('board')">게시판/팝업 관리</button>
    <button class="tab-btn" onclick="switchTab('inquiries')">수정/문의 사항</button>
    <button class="tab-btn" onclick="switchTab('stats')">통계 현황</button>
</div>
<div id="section-stats" class="section">
    <h2>방문자 및 조회수 통계</h2>
    <div class="stat-box">오늘 전체 방문자: 개발 준비중 (DB 연동 필요)</div>
    <div class="stat-box">가장 많이 조회된 장소: 개발 준비중</div>
    <div class="stat-box">최다 조회 게시글: 개발 준비중</div>
</div>
<div id="section-board" class="section">
    <table>
        <thead><tr><th>ID</th><th>상태</th><th>제목</th><th>팝업기한</th><th>설정</th></tr></thead>
        <tbody id="board-tbody"></tbody>
    </table>
</div>
</body>
</html>
