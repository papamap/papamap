<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아빠맵 - 관리자 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f3f5; margin: 0; padding: 24px; color: #343a40; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 24px; font-weight: 800; color: #212529; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 12px; font-size: 15px; font-weight: 800; cursor: pointer; background: white; color: #adb5bd; transition: 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .tab-btn.active { background: #343a40; color: white; }
        .section { display: none; }
        .section.active { display: block; }
        .control-bar { display: flex; gap: 12px; margin-bottom: 20px; background: white; padding: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); align-items: center; }
        .control-bar input, .control-bar select { padding: 10px; border: 1px solid #dee2e6; border-radius: 8px; font-size: 14px; outline: none; }
        .control-bar input { width: 250px; }
        .stat-badge { background: #e9ecef; padding: 6px 12px; border-radius: 20px; font-weight: 700; font-size: 13px; color: #495057; margin-left: auto; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.05); text-align: left; }
        th, td { padding: 12px 16px; border-bottom: 1px solid #f1f3f5; font-size: 14px; }
        th { background-color: #343a40; color: white; font-weight: 600; white-space: nowrap; }
        tr:hover { background-color: #f8f9fa; }
        td input[type="text"], td select { width: 100%; padding: 8px; border: 1px solid transparent; border-radius: 6px; font-size: 13px; background: transparent; font-family: inherit; transition: 0.2s; box-sizing: border-box; }
        td input[type="text"]:focus, td select:focus { border-color: #5c7cfa; background: white; box-shadow: 0 0 0 3px rgba(92,124,250,0.1); }
        td input[type="text"]:hover, td select:hover { border-color: #dee2e6; background: white; }
        .btn { padding: 8px 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.1s; font-size: 12px; white-space: nowrap; }
        .btn-save { background: #5c7cfa; color: white; }
        .btn-save:active { transform: scale(0.95); background: #4c6ef5; }
        .btn-del { background: #fff0f0; color: #FF6B6B; }
        .btn-del:active { transform: scale(0.95); background: #ffe3e3; }
        .btn-approve { background: #20c997; color: white; }
        .btn-approve:active { transform: scale(0.95); background: #12b886; }
        .cat-chip { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 800; }
        .cat-indoor { color: #5c7cfa; background: rgba(92,124,250,0.1); }
        .cat-outdoor { color: #0ca678; background: rgba(12,166,120,0.1); }
        .cat-moonsen { color: #f59f00; background: rgba(245,159,0,0.1); }
    </style>
</head>
<body>
    <div id="login-screen" style="display:none; text-align:center; margin-top: 80px;">
        <div style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: inline-block; width: 320px;">
            <h2 style="margin-bottom: 10px;">관리자 로그인</h2>
            <p style="color:#868e96; font-size:13px; margin-bottom:24px;">승인된 관리자만 접근 가능합니다.</p>
            <div style="display:flex; flex-direction:column; gap:12px;">
                <input type="email" id="admin-email" placeholder="이메일" style="padding:14px; border:1px solid #dee2e6; border-radius:10px; outline:none;">
                <input type="password" id="admin-password" placeholder="비밀번호" style="padding:14px; border:1px solid #dee2e6; border-radius:10px; outline:none;">
                <button onclick="submitAdminLogin()" style="padding:14px; border:none; border-radius:10px; background:#343a40; color:white; font-weight:800; cursor:pointer; margin-top:10px;">로그인</button>
            </div>
            <p id="login-error" style="color:#FF6B6B; font-size:12px; margin-top:16px; display:none;"></p>
        </div>
    </div>

    <div id="admin-main" style="display:none;">
        <div class="header">
            <h1>아빠맵 관리자 대시보드 🛠️</h1>
            <a href="index.html" style="color:#5c7cfa; text-decoration:none; font-weight:700; font-size:14px;">본 서비스로 이동 ➔</a>
        </div>
        <div class="tabs">
            <button class="tab-btn active" id="btn-tab-places" onclick="switchTab('places')">장소 승인 및 관리</button>
            <button class="tab-btn" id="btn-tab-board" onclick="switchTab('board')">게시판/팝업 관리</button>  
            <button class="tab-btn" id="btn-tab-comments" onclick="switchTab('comments')">댓글 관리</button>
            <button class="tab-btn" id="btn-tab-inquiries" onclick="switchTab('inquiries')">수정/문의 확인</button>
        </div>

        <div id="section-board" class="section">
            <table>
                <thead>
                    <tr>
                        <th style="width: 5%;">ID</th>
                        <th style="width: 10%;">공지여부</th>
                        <th style="width: 10%;">팝업여부</th>
                        <th style="width: 10%;">작성자</th>
                        <th style="width: 45%;">제목</th>
                        <th style="width: 10%;">작성일시</th>
                        <th style="width: 10%;">관리</th>
                    </tr>
                </thead>
                <tbody id="board-tbody"></tbody>
            </table>
        </div>

        <div id="section-places" class="section active">
            <div class="control-bar">
                <input type="text" id="admin-search" placeholder="장소명 검색..." onkeyup="renderAdminTable()">
                <select id="admin-category" onchange="renderAdminTable()">
                    <option value="">모든 카테고리</option>
                    <option value="실내">실내</option>
                    <option value="야외">야외</option>
                    <option value="문센">문센</option>
                </select>
                <select id="admin-approval" onchange="renderAdminTable()">
                    <option value="">승인/미승인 전체</option>
                    <option value="false">❗ 미승인 장소만 보기</option>
                    <option value="true">✅ 승인된 장소만 보기</option>
                </select>
                <div class="stat-badge" id="total-count">총 0개</div>
            </div>

            <div class="control-bar" id="bulk-bar" style="display: none; background: rgba(92,124,250,0.1); border: 1px solid #5c7cfa;">
                <span style="font-size: 13px; font-weight: 700; color: #5c7cfa;"><span id="sel-count">0</span>개 선택됨</span>
                <select id="bulk-category" style="padding: 6px 10px; border-radius: 6px; border: none; font-size: 13px; outline: none; margin-left: 10px;">
                    <option value="실내">실내로 변경</option>
                    <option value="야외">야외로 변경</option>
                    <option value="문센">문센으로 변경</option>
                </select>
                <button class="btn btn-save" onclick="bulkAction('category')">일괄 카테고리 변경</button>
                <button class="btn btn-approve" onclick="bulkAction('approve')" style="margin-left:auto;">✅ 일괄 승인</button>
                <button class="btn btn-del" onclick="bulkAction('delete')">🗑️ 일괄 삭제</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th style="width: 40px; text-align: center;"><input type="checkbox" id="cb-all" onclick="toggleAll(this)"></th>
                        <th style="width: 50px;">상태</th>
                        <th style="width: 9%;">카테고리</th>
                        <th style="width: 15%;">장소명</th>
                        <th style="width: 12%;">주차 정보</th>
                        <th style="width: 12%;">입장료</th>
                        <th style="width: 12%;">수유실</th>
                        <th style="width: 15%;">설명</th>
                        <th style="width: 10%;">관리</th>
                    </tr>
                </thead>
                <tbody id="admin-tbody"></tbody>
            </table>
        </div>

        <div id="section-comments" class="section">
            <table>
                <thead>
                    <tr>
                        <th style="width: 15%;">소속 장소</th>
                        <th style="width: 10%;">작성자</th>
                        <th style="width: 50%;">댓글 내용</th>
                        <th style="width: 15%;">작성일시</th>
                        <th style="width: 10%;">삭제</th>
                    </tr>
                </thead>
                <tbody id="comments-tbody"></tbody>
            </table>
        </div>

        <div id="section-inquiries" class="section">
            <table>
                <thead>
                    <tr>
                        <th style="width: 60px;">ID</th>
                        <th style="width: 15%;">접수일시</th>
                        <th style="width: 59%;">수정요청/문의 내용</th>
                        <th style="width: 20%;">연락처(장소ID)</th>
                    </tr>
                </thead>
                <tbody id="inquiries-tbody"></tbody>
            </table>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
