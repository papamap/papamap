<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아빠맵 - 관리자 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f3f5; margin: 0; padding: 24px; color: #343a40; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 24px; font-weight: 800; color: #212529; }
        
        .control-bar { display: flex; gap: 12px; margin-bottom: 20px; background: white; padding: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); align-items: center; }
        .control-bar input, .control-bar select { padding: 10px; border: 1px solid #dee2e6; border-radius: 8px; font-size: 14px; outline: none; }
        .control-bar input { width: 250px; }
        .stat-badge { background: #e9ecef; padding: 6px 12px; border-radius: 20px; font-weight: 700; font-size: 13px; color: #495057; margin-left: auto; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.05); text-align: left; }
        th, td { padding: 12px 16px; border-bottom: 1px solid #f1f3f5; font-size: 14px; }
        th { background-color: #343a40; color: white; font-weight: 600; white-space: nowrap; }
        tr:hover { background-color: #f8f9fa; }
        
        /* 엑셀 방식의 인라인 입력폼 */
        td input[type="text"], td select { width: 100%; padding: 8px; border: 1px solid transparent; border-radius: 6px; font-size: 13px; background: transparent; font-family: inherit; transition: 0.2s; box-sizing: border-box; }
        td input[type="text"]:focus, td select:focus { border-color: #5c7cfa; background: white; box-shadow: 0 0 0 3px rgba(92,124,250,0.1); }
        td input[type="text"]:hover, td select:hover { border-color: #dee2e6; background: white; }

        .btn { padding: 8px 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.1s; font-size: 12px; white-space: nowrap; }
        .btn-save { background: #5c7cfa; color: white; }
        .btn-save:active { transform: scale(0.95); background: #4c6ef5; }
        .btn-del { background: #fff0f0; color: #FF6B6B; }
        .btn-del:active { transform: scale(0.95); background: #ffe3e3; }
        
        .cat-chip { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 800; }
        .cat-indoor { color: #5c7cfa; background: rgba(92,124,250,0.1); }
        .cat-outdoor { color: #0ca678; background: rgba(12,166,120,0.1); }
    </style>
</head>
<body>
    <div class="header">
        <h1>아빠맵 관리자 대시보드 🛠️</h1>
        <a href="index.html" style="color:#5c7cfa; text-decoration:none; font-weight:700; font-size:14px;">본 서비스로 이동 ➔</a>
    </div>

    <div class="control-bar">
        <input type="text" id="admin-search" placeholder="장소명 검색..." onkeyup="renderAdminTable()">
        <select id="admin-category" onchange="renderAdminTable()">
            <option value="">모든 카테고리</option>
            <option value="실내">실내</option>
            <option value="야외">야외</option>
        </select>
        <div class="stat-badge" id="total-count">총 0개</div>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 50px;">ID</th>
                <th style="width: 10%;">카테고리</th>
                <th style="width: 20%;">장소명</th>
                <th style="width: 15%;">주차 정보</th>
                <th style="width: 15%;">입장료</th>
                <th style="width: 15%;">수유실</th>
                <th style="width: 10%;">저장</th>
                <th style="width: 10%;">삭제</th>
            </tr>
        </thead>
        <tbody id="admin-tbody">
            </tbody>
    </table>

    <script src="admin.js"></script>
</body>
</html>
